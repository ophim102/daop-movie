name: Purge movie data
on:
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Purge generated movie data (keep config)
        run: |
          set -e
          if [ ! -d "public/data" ]; then
            echo "public/data not found; nothing to purge."
            exit 0
          fi
          echo "Purging public/data/* (except public/data/config)"
          find public/data -mindepth 1 -maxdepth 1 -not -name config -exec rm -rf {} +

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/data
          git diff --staged --quiet || (git commit -m "chore: purge movie data" && git push)
