name: Delete movie images on R2
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "prefix | keys | movie_ids"
        required: false
        default: "prefix"
      prefix:
        description: "Prefix to delete (e.g. thumbs/ or posters/)"
        required: false
        default: ""
      keys:
        description: "Object keys to delete (newline/comma separated)"
        required: false
        default: ""
      movie_ids:
        description: "Movie IDs to delete from r2_upload_state.json (newline/comma separated)"
        required: false
        default: ""
      kind:
        description: "thumb | poster | both"
        required: false
        default: "both"
      dry_run:
        description: "Dry run only (true/false)"
        required: false
        default: "true"
      limit:
        description: "Limit objects deleted (0 = no limit)"
        required: false
        default: "0"
jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - name: Delete images on R2
        run: |
          node scripts/delete-movie-images-r2.js \
            --mode "${{ inputs.mode }}" \
            --prefix "${{ inputs.prefix }}" \
            --keys "${{ inputs.keys }}" \
            --movie_ids "${{ inputs.movie_ids }}" \
            --kind "${{ inputs.kind }}" \
            --dry_run "${{ inputs.dry_run }}" \
            --limit "${{ inputs.limit }}"
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

      - name: Commit delete state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/data/r2_upload_state.json
          git diff --staged --quiet || (git commit -m "chore: update R2 upload state (delete)" && git push)
